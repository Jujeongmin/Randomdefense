<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>랜덤 디펜스</title>
  </head>
  <body>
    <div id="app">
      <!-- 메인 화면 -->
      <div id="main-menu">
        <div class="menu-inner">
          <h1 class="game-title">랜덤 디펜스</h1>
          <div class="menu-crystals">💎 <span id="menu-crystal-amount">0</span></div>
          <button id="menu-start" class="menu-btn primary">게임 시작</button>
          <button id="menu-shop" class="menu-btn">🛒 상점</button>
          <button id="menu-lab" class="menu-btn">🔬 연구소</button>
          <div class="menu-record">최고 기록: <span id="menu-best">0</span> 웨이브</div>
        </div>
      </div>

      <div id="game-frame" class="hidden">
        <!-- 상단 바 -->
        <header id="topbar">
          <div class="top-left">
            <div id="mob-portrait" class="frame-sprite"></div>
            <span id="mob-race">-</span>
          </div>
          <div class="top-center">
            <div id="wave-label">Wave 1</div>
            <div id="boss-timer" class="hidden">120.0</div>
          </div>
          <div class="top-right">
            <button id="btn-mute" class="icon-btn">🔊</button>
            <button id="btn-pause" class="icon-btn">❚❚</button>
            <button id="btn-speed" class="icon-btn">1x</button>
          </div>
        </header>

        <!-- 전장 -->
        <main id="battlefield">
          <canvas id="game-canvas"></canvas>
          <div id="summon-log"></div>
          <div id="gold-badge"><span class="coin">🪙</span><span id="gold-amount">100</span></div>
          <div id="mythic-banner" class="hidden"></div>
          <div id="debug-panel" class="hidden">
            <button id="debug-mythic">🐛 신화</button>
            <button id="debug-eternal">🐛 태초</button>
          </div>
        </main>

        <!-- 진행 바 -->
        <div id="progress-row">
          <div id="mob-progress-bar"><div id="mob-progress-fill"></div></div>
          <div id="mob-count-label">0 / 100</div>
        </div>

        <!-- 하단 조작부 -->
        <section id="controls">
          <div class="control-buttons">
            <button id="btn-sell-panel" class="side-btn">🛒<br />판매</button>
            <button id="btn-summon" class="summon-btn">
              <span class="summon-title">소환</span>
              <span class="summon-cost"><span class="coin">🪙</span>20</span>
            </button>
            <button id="btn-menu" class="side-btn">🏠<br />메인</button>
          </div>
          <div id="unit-stacks"></div>
        </section>
      </div>

      <!-- 오버레이 패널들 -->
      <div id="sell-panel" class="overlay hidden"></div>
      <div id="lab-panel" class="overlay hidden"></div>
      <div id="shop-panel" class="overlay hidden"></div>
      <div id="quest-panel" class="overlay hidden"></div>
      <div id="gameover-panel" class="overlay hidden"></div>
    </div>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
